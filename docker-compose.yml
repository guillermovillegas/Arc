version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: arc-postgres
    environment:
      POSTGRES_USER: arc
      POSTGRES_PASSWORD: arc_dev
      POSTGRES_DB: arc_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: arc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
