name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @arc/shared build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arc
          POSTGRES_PASSWORD: arc_test
          POSTGRES_DB: arc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @arc/shared build

      - name: Generate Prisma client
        run: pnpm --filter @arc/api exec prisma generate

      - name: Run migrations
        run: pnpm --filter @arc/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://arc:arc_test@localhost:5432/arc_test?schema=public

      - name: Run tests
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://arc:arc_test@localhost:5432/arc_test?schema=public
          JWT_SECRET: test-jwt-secret-minimum16chars
          JWT_REFRESH_SECRET: test-refresh-secret-minimum16chars
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NODE_ENV: test
