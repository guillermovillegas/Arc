name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @arc/shared build
      - run: pnpm --filter @arc/api build

      # Add your deployment steps here (Docker push, Railway, Fly.io, etc.)
      - name: Deploy API
        run: echo "Add deployment configuration here"

  deploy-web:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @arc/shared build
      - run: pnpm --filter @arc/web build

      # Add Vercel/Netlify deployment steps here
      - name: Deploy Web
        run: echo "Add deployment configuration here"
